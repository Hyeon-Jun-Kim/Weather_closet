name: Weather_closet
options:
  bundleIdPrefix: com.hyeonjunkim
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_PREVIEWS: "YES"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: U4STX4QR4M
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEAD_CODE_STRIPPING: YES
    SWIFT_COMPILATION_MODE: wholemodule
  configs:
    Debug:
      SWIFT_COMPILATION_MODE: incremental

packages:
  LookinServer:
    url: https://github.com/QMUI/LookinServer
    from: 1.2.8
  RxSwift:
    url: https://github.com/ReactiveX/RxSwift
    from: 6.7.0

targets:
  Weather_closet:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Weather_closet
        excludes:
          - "**/*.md"
    resources:
      - path: Weather_closet/Resources/Assets.xcassets
    dependencies:
      - package: LookinServer
        product: LookinServer
      - package: RxSwift
        product: RxSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hyeonjunkim.Weather-closet
        INFOPLIST_FILE: Weather_closet/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Weather_closet/Info.plist
      properties:
        CFBundleName: Weather Closet
        CFBundleDisplayName: Weather Closet
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIRequiredDeviceCapabilities:
          - arm64
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: "날씨 정보를 위해 현재 위치가 필요합니다."
        NSCameraUsageDescription: "옷 사진 촬영을 위해 카메라 접근이 필요합니다."
        UILaunchScreen:
          UIColorName: AccentColor

  Weather_closetTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Weather_closetTests
    dependencies:
      - target: Weather_closet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hyeonjunkim.Weather-closetTests

  Weather_closetUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Weather_closetUITests
    dependencies:
      - target: Weather_closet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hyeonjunkim.Weather-closetUITests

schemes:
  Weather_closet:
    build:
      targets:
        Weather_closet: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - Weather_closetTests
        - Weather_closetUITests
    profile:
      config: Release
    archive:
      config: Release
